<!-- Real Supabase client for AI Judge video upload + edge-function calls.
     Falls back to the HZdb in-browser mock when keys are absent. -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
  const URL = 'https://ldhzkdqznccfgpdvqyfk.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkaHprZHF6bmNjZmdwZHZxeWZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTY1MTksImV4cCI6MjA5MDg5MjUxOX0.yPihX_N734HXTk8mzf-F85W_5j_J7EXe3Dg1U90ZMYI';
  window.HZsupa = createClient(URL, ANON, {
    auth: {
      persistSession: true,
      detectSessionInUrl: true,
      autoRefreshToken: true,
      storage: window.localStorage,
      storageKey: 'hz.auth',
    },
    realtime: { params: { eventsPerSecond: 10 } },
    global: { headers: { 'x-client': 'hit-zero-pwa' } },
  });
  window.HZ_FN_BASE = URL;
  window.HZ_ANON_KEY = ANON;

  // ─── Mirror: pull real Supabase analyses into the in-browser HZdb so the
  // existing history + scorecard screens render them. The UI was built
  // against the mock store; this keeps the screens dumb while the real
  // backend drives the data. Safe to call repeatedly — it de-dupes by id.
  function upsert(bucket, row) {
    if (!row || !row.id) return;
    const arr = bucket;
    const i = arr.findIndex(x => x.id === row.id);
    if (i >= 0) arr[i] = row; else arr.push(row);
  }
  async function mirrorAnalysis(id) {
    const d = window.HZdb && window.HZdb._raw && window.HZdb._raw();
    if (!d || !window.HZsupa) return null;
    const s = window.HZsupa;
    const [a, els, dds, fb, su] = await Promise.all([
      s.from('routine_analyses').select('*').eq('id', id).maybeSingle(),
      s.from('analysis_elements').select('*').eq('analysis_id', id),
      s.from('analysis_deductions').select('*').eq('analysis_id', id),
      s.from('analysis_feedback').select('*').eq('analysis_id', id),
      s.from('analysis_skill_updates').select('*').eq('analysis_id', id),
    ]);
    if (a.error || !a.data) return null;
    d.routine_analyses = d.routine_analyses || [];
    d.analysis_elements = d.analysis_elements || [];
    d.analysis_deductions = d.analysis_deductions || [];
    d.analysis_feedback = d.analysis_feedback || [];
    d.analysis_skill_updates = d.analysis_skill_updates || [];
    upsert(d.routine_analyses, a.data);
    (els.data || []).forEach(r => upsert(d.analysis_elements, r));
    (dds.data || []).forEach(r => upsert(d.analysis_deductions, r));
    (fb.data || []).forEach(r => upsert(d.analysis_feedback, r));
    (su.data || []).forEach(r => upsert(d.analysis_skill_updates, r));
    // Re-snapshot so selectors see the new rows.
    if (window.HZsel && window.HZsel._refresh) await window.HZsel._refresh();
    return a.data;
  }
  async function mirrorRecent(teamId, n = 20) {
    if (!window.HZsupa || !teamId) return;
    const d = window.HZdb && window.HZdb._raw && window.HZdb._raw();
    const s = window.HZsupa;
    const { data } = await s.from('routine_analyses')
      .select('id').eq('team_id', teamId)
      .order('created_at', { ascending: false }).limit(n);
    if (!data) return;
    // Drop any stale local rows whose team_id doesn't match the live team —
    // otherwise the seeded "Senior Coed 4 L4" demo row lingers in history.
    if (d) {
      const keep = new Set(data.map(r => r.id));
      const filt = (arr) => (arr || []).filter(r => !r.team_id || r.team_id === teamId || keep.has(r.analysis_id) || keep.has(r.id));
      d.routine_analyses = (d.routine_analyses || []).filter(r => r.team_id === teamId);
      d.analysis_elements = filt(d.analysis_elements);
      d.analysis_deductions = filt(d.analysis_deductions);
      d.analysis_feedback = filt(d.analysis_feedback);
      d.analysis_skill_updates = filt(d.analysis_skill_updates);
    }
    for (const r of data) await mirrorAnalysis(r.id);
  }
  // Mirror the live team + athletes from Supabase. The HZdb mock seeds a
  // Senior Coed 4 team; if the real roster has been updated (e.g. Magic Minis
  // Mini L1), we overwrite the first team slot so every screen picks it up.
  async function mirrorRosterLive() {
    const d = window.HZdb && window.HZdb._raw && window.HZdb._raw();
    if (!d || !window.HZsupa) return;
    const s = window.HZsupa;
    const { data: programs } = await s.from('programs').select('*').is('deleted_at', null).order('created_at');
    if (programs?.length) {
      d.programs = programs;
      const programIds = programs.map(p => p.id);
      const paymentSettings = await s.from('program_payment_settings').select('*').in('program_id', programIds);
      if (!paymentSettings.error) d.program_payment_settings = paymentSettings.data || [];
    }
    const { data: teams } = await s.from('teams').select('*').is('deleted_at', null).order('created_at');
    if (!teams || !teams.length) return;
    d.teams = teams;
    const ids = teams.map(t => t.id);
    const [{ data: athletes }, { data: profiles }] = await Promise.all([
      s.from('athletes').select('*').in('team_id', ids).is('deleted_at', null),
      s.from('profiles').select('*').order('display_name'),
    ]);
    d.athletes = athletes || [];
    if (profiles?.length) d.profiles = profiles;
    const aIds = d.athletes.map(a => a.id);
    if (aIds.length) {
      const [ask, pl] = await Promise.all([
        s.from('athlete_skills').select('*').in('athlete_id', aIds),
        s.from('parent_links').select('*').in('athlete_id', aIds),
      ]);
      d.athlete_skills = ask.data || [];
      d.parent_links = pl.data || [];
    } else {
      d.athlete_skills = []; d.parent_links = [];
    }
    const routineTables = [
      ['routine_audio_assets', 'routine_id'],
      ['music_licenses', 'routine_id'],
      ['routine_count_maps', 'routine_id'],
      ['routine_events', 'routine_id'],
      ['routine_assignments', 'routine_id'],
      ['routine_ai_suggestions', 'routine_id'],
      ['routine_exports', 'routine_id'],
      ['routine_versions', 'routine_id'],
      ['routine_comments', 'routine_id'],
      ['routine_audio_analysis_jobs', 'routine_id'],
      ['routine_remix_requests', 'routine_id'],
      ['routine_music_compliance_checks', 'routine_id'],
    ];
    const { data: routines } = await s.from('routines').select('*').in('team_id', ids).order('created_at');
    if (routines?.length) {
      d.routines = routines;
      const routineIds = routines.map(r => r.id);
      const [sections, formations, ...routineRows] = await Promise.all([
        s.from('routine_sections').select('*').in('routine_id', routineIds).order('position'),
        s.from('routine_formations').select('*').in('routine_id', routineIds).order('start_count'),
        ...routineTables.map(([table, col]) => s.from(table).select('*').in(col, routineIds)),
      ]);
      d.routine_sections = sections.data || [];
      d.routine_formations = formations.data || [];
      routineRows.forEach((res, i) => { d[routineTables[i][0]] = res.data || []; });
      const formationIds = d.routine_formations.map(f => f.id);
      if (formationIds.length) {
        const { data: positions } = await s.from('routine_positions').select('*').in('formation_id', formationIds);
        d.routine_positions = positions || [];
      } else {
        d.routine_positions = [];
      }
    }
    const liveSession = window.HZdb?.auth?._getSession?.();
    if (liveSession?.profile) upsert(d.profiles || (d.profiles = []), liveSession.profile);
    if (window.HZsel && window.HZsel._refresh) await window.HZsel._refresh();
  }
  window.HZmirror = { analysis: mirrorAnalysis, recent: mirrorRecent, roster: mirrorRosterLive };

  // Wrap HZsel.snapshot so every snapshot pulls the live roster first. This
  // guarantees the team + athletes are always the real Supabase ones, not
  // the stale mock seed — no matter which screen triggered the snapshot.
  (function patchSnapshot() {
    // HZsel loads after this script, so defer until it exists.
    function patch() {
      if (!window.HZsel || !window.HZsel.snapshot) { setTimeout(patch, 30); return; }
      const orig = window.HZsel.snapshot.bind(window.HZsel);
      window.HZsel.snapshot = async function(...args) {
        try { await mirrorRosterLive(); } catch (e) { console.warn('mirror roster failed', e); }
        return orig(...args);
      };
    }
    patch();
  })();

  // Swallow drag-and-drop at the window level so a miss on the dropzone
  // doesn't make Chrome navigate to the file (which is what was creating
  // duplicate copies in Downloads).
  ['dragover','drop'].forEach(ev =>
    window.addEventListener(ev, (e) => { e.preventDefault(); }, { capture: true })
  );
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        // If there's already a waiting worker (new version ready), activate it now.
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
      // When the active worker changes, reload once so the page uses the new bundle.
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    });
  }
</script>
